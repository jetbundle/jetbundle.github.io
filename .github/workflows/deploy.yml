name: Deploy static site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - name: Prepare site
        run: |
          mkdir -p _site \
            _site/physics \
            _site/financial-computational-sciences \
            _site/intelligence-engineering \
            _site/space-energy-research
          cp index.html styles.css _site/
          cp physics/index.html _site/physics/
          cp financial-computational-sciences/index.html _site/financial-computational-sciences/
          cp intelligence-engineering/index.html _site/intelligence-engineering/
          cp space-energy-research/index.html _site/space-energy-research/
      - name: Verify output
        run: |
          test -f _site/index.html && test -s _site/index.html
          test -f _site/styles.css
          test -f _site/physics/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
